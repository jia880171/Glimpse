allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(':app')
}
subprojects { project ->
    project.plugins.withId("com.android.library") {
        project.extensions.configure("android") { androidExtension ->
            if (androidExtension != null && androidExtension.hasProperty("namespace")) {
                def currentNamespace = androidExtension.namespace
                if (currentNamespace == null || currentNamespace.toString().trim().isEmpty()) {
                    def fallbackNamespace = "${project.group ?: rootProject.name}.${project.name}"
                            .replace('-', '_')
                            .replaceAll('[^A-Za-z0-9_.]', '')
                    androidExtension.namespace = fallbackNamespace
                }
            }
        }
    }
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
